<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0"> 
		<meta name="description" content="">
		<link rel="stylesheet" href="/bundle.css">
		<title>{{ title }}</title>
	</head>
	<body>
		<main>
			<header>
			<div class="header">
				<img src="/img/chirho_eagle.png">
				<div>
					<h1>ROMA AETERNA EST</h1>

				</div>
				<img src="/img/chirho_eagle.png">
			</div>
			</header>
			<div class="content">
				{% if tags contain article %}
				<div class="metadata">
					<h2>{{title}}</h2>
					{% if subtitle %}
					<h3><i>{{subtitle}}</i><h3>
					{% endif %}
					<h3>Authored by {{authors | join: ", "}} on {{date | date: '%B %d, %Y'}}</h3>

					<a href="/">Return home</a>
				</div>
				{% endif %}
				{{ content }}
			<div>
		</main>
	</body>
</html>
